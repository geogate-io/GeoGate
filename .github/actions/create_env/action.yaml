name: Create run environment
author: Ufuk Turuncoglu
description: 'Create run environment using Spack package manager'
inputs:
  backend:
    description: 'ParaView backend for headless mode'
    required: false
    type: choice
    options:
      - egl
      - osmesa
    default: 'osmesa'
  catalyst:
    description: 'Catalyst version'
    required: false
    type: string
    default: '2.1.0'
  compiler:
    description: 'Compiler type and version'
    required: false
    type: string
    default: 'gcc@14.2.0'
  conduit:
    description: 'Conduit version'
    required: false
    type: string
    default: '0.9.7'
  esmf: 
    description: 'ESMF version, branch or tag like 8.8.0, develop or =8.5.0b23'
    required: false
    type: string
    default: 'develop'
  install_dir:
    description: 'Spack dependency installation directory'
    required: false
    type: string
    default: '~/.spack-ci'
  paraview:
    description: 'ParaView version'
    required: false
    type: string
    default: '6.1.1'
  python:
    description: 'Python version'
    required: false
    type: string
    default: '3.12.12'
  spack:
    description: 'Spack version'
    required: false
    type: string
    default: 'develop'
outputs:
  cache_name:
    description: 'Name of the stored cache'
    value: ${{ steps.set-env.outputs.CACHE_NAME }}
  pkgs_list:
    description: 'List of core packages installed using apt'
    value: ${{ steps.install-core-pkgs.outputs.PKGS_LIST }}

runs:
  using: composite
  steps:
  - name: Install Core Development Tools
    id: install-core-pkgs
    run: |
      PKGS_LIST="\
        wget \
        tar \
        unzip \
        file \
        gettext \
        autopoint \
        gringo \
        llvm meson \
        build-essential \
        binutils-dev \
        gfortran \
        python3-dev \
        python3-pip \
        python3-yaml \
        openmpi-bin \
        openmpi-common \
        libopenmpi-dev \
        curl \
        libcurl4-openssl-dev \
        tcl \
        tcl-dev \
        unzip \
        wayland-protocols \
        libdrm-dev \
        libegl-dev \
        libwayland-dev \
        libwayland-egl-backend-dev \
        eglexternalplatform-dev \
        meson \
        mesa-utils \
        libglu1-mesa-dev \
        freeglut3-dev \
        mesa-common-dev \
        libglew-dev \
        libglfw3-dev \
        libglm-dev \
        libssl-dev \
        pkg-config \
        libssh2-1-dev"
      echo "PKGS_LIST=$PKGS_LIST" >> $GITHUB_OUTPUT

      sudo apt-get -qq update
      sudo apt-get -qq install $PKGS_LIST
    shell: bash

  - name: Define Required Environment Variables
    id: set-env
    run: |
      compiler=`echo ${{ inputs.compiler }} | awk -F@ '{print $1}'`
      compiler_ver=`echo ${{ inputs.compiler }} | awk -F@ '{print $2}'`
      paraview_major=`echo ${{ inputs.paraview }} | cut -d. -f1`
      if [[ "$paraview_major" =~ ^[0-9]+$ ]] && [ "$paraview_major" -ge 6 ]; then
        pv_render_variant="osmesa_fallback"
      else
        pv_render_variant="opengl2"
      fi
      SPACK_PKGS="\"\"lmod\":"
      SPACK_PKGS+="\"esmf@${{ inputs.esmf }}+external-parallelio\":"
      SPACK_PKGS+="\"libcatalyst@${{ inputs.catalyst }}+fortran~ipo+python ^conduit@${{ inputs.conduit }}+python~hdf5~parmetis\":"
      SPACK_PKGS+="\"paraview@${{ inputs.paraview }}+libcatalyst+fortran~ipo+mpi+python+${pv_render_variant}+cdi ^libcatalyst@${{ inputs.catalyst }}+fortran~ipo+python\"\""
      echo "SPACK_PKGS=$SPACK_PKGS" >> $GITHUB_OUTPUT
      CACHE_NAME="spack-${{ inputs.spack }}-${{ runner.os }}-${compiler}_${compiler_ver}-esmf_${{ inputs.esmf }}-catalyst_${{ inputs.catalyst }}-conduit_${{ inputs.conduit }}-paraview_${{ inputs.paraview }}_${{ inputs.backend }}-python_${{ inputs.python }}"
      echo "CACHE_NAME=$CACHE_NAME" >> $GITHUB_OUTPUT
    shell: bash

  - name: Checkout Component Repository
    uses: actions/checkout@v4
    with:
      path: ${{ github.workspace }}/app/geogate

  - name: Restore Cached Dependencies
    id: restore-cache
    uses: actions/cache/restore@v4
    with:
      path: |
        ${{ github.workspace }}/app/spack
        /home/runner/.spack
      key: ${{ steps.set-env.outputs.CACHE_NAME }}

  # GitHub Actions cache service occasionally logs "Cache hit" but then fails to
  # download the entry ("Cache not found for input keys"), see
  # https://github.com/actions/cache/issues/1621. Retry once before paying for a
  # full rebuild, since this is usually a transient service hiccup.
  - name: Retry Restore Cached Dependencies
    id: restore-cache-retry
    if: steps.restore-cache.outputs.cache-hit != 'true'
    uses: actions/cache/restore@v4
    with:
      path: |
        ${{ github.workspace }}/app/spack
        /home/runner/.spack
      key: ${{ steps.set-env.outputs.CACHE_NAME }}

  - name: Create Spack Environment and Install Dependencies
    id: spack-env
    if: steps.restore-cache.outputs.cache-hit != 'true' && steps.restore-cache-retry.outputs.cache-hit != 'true'
    run: |
      ${{ github.workspace }}/app/geogate/.github/actions/create_env/install_deps.sh \
        -b "${{ inputs.backend }}" \
        -c "${{ inputs.compiler }}" \
        -d "${{ steps.set-env.outputs.SPACK_PKGS }}" \
        -i "${{ inputs.install_dir }}" \
        -p "${{ inputs.paraview }}" \
        -s "${{ inputs.spack }}" \
        -y "${{ inputs.python }}"
    shell: bash

  - name: Save Dependencies to Cache
    id: save-cache
    if: steps.restore-cache.outputs.cache-hit != 'true' && steps.restore-cache-retry.outputs.cache-hit != 'true' && steps.spack-env.outcome == 'success'
    uses: actions/cache/save@v4
    with:
      path: |
        ${{ github.workspace }}/app/spack
        /home/runner/.spack
      key: ${{ steps.set-env.outputs.CACHE_NAME }}

  - name: Set Module Path
    if: steps.restore-cache.outputs.cache-hit == 'true' || steps.restore-cache-retry.outputs.cache-hit == 'true'
    run: |
      dirs=$(find "${{ inputs.install_dir }}/spack/share/spack/lmod" -type d -name Core | sort -u | paste -sd:)
      echo "MODULEPATH=${dirs}${MODULEPATH:+:$MODULEPATH}" >> "$GITHUB_ENV"
    shell: bash

  - name: Debug Outout
    run: |
      cd ${{ inputs.install_dir }}/spack
      . share/spack/setup-env.sh
      spack env activate test
      cat var/spack/environments/test/spack.yaml
      spack --color always concretize --force --deprecated --reuse
    shell: bash
